name: bob-validate

# Enforces the BOB spec layer automatically: spec-vs-format drift = red build.
# This is the "executable" part of "executable specs" — discipline by CI, not goodwill.

on:
  push:
  pull_request:

jobs:
  validate:
    name: bob-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Tooling self-tests (validator, traceability, runtime, ready, benchmark)
        run: python -m unittest discover -s tests -v

      - name: Validate shipped example spec layer (strict: assertionless tests fail)
        run: python scripts/bob_validate.py examples/todo-api --strict

      - name: Runtime/golden checks on shipped example
        run: python scripts/bob_runtime_check.py examples/todo-api

      - name: Adoption gate (example must be BOB-ready + tests green)
        run: python scripts/bob_ready.py examples/todo-api --run-tests

      - name: Demo unit tests (spec-traced)
        run: python -m unittest discover -s examples/todo-api/tests -v

      - name: Benchmark the demo (quality + footprint gate)
        run: python scripts/bob_benchmark.py --json
