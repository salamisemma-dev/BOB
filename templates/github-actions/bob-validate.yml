# Copy this into YOUR project's .github/workflows/ to enforce its BOB spec layer.
# Rename to bob-validate.yml. Assumes scripts/bob_validate.py is vendored into your
# repo (copy it from the BOB plugin) or installed on PATH.
name: bob-validate

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate spec layer (strict: structure + spec-to-test + assertion gate)
        run: python scripts/bob_validate.py . --strict
      - name: Runtime/golden checks
        run: python scripts/bob_runtime_check.py .
      - name: Adoption gate + run the test suite (READY means specs valid AND tests green)
        run: python scripts/bob_ready.py . --run-tests
        # For Node/TS projects, ensure deps are installed first:
        #   - uses: actions/setup-node@v4
        #   - run: npm ci
        # bob_ready --run-tests auto-detects `npm test` from package.json.

# Make this workflow a REQUIRED status check on your default branch (branch
# protection) so a red gate blocks merge — that's what makes BOB enforcing, not advisory.
